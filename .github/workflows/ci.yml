name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      # Blocking: tipe harus bersih.
      - name: Type check
        run: pnpm exec tsc --noEmit

      # Informational: repo punya banyak lint error pre-existing,
      # jadi belum di-block. Tetap ditampilkan di log.
      - name: Lint (informational)
        run: pnpm lint
        continue-on-error: true

      # Blocking hanya untuk kerentanan high+ pada dependency produksi,
      # agar tidak rewel oleh advisory transitif/dev minor.
      - name: Audit (prod, high+)
        run: pnpm audit --prod --audit-level high
